services:
  postgres:
    image: postgres:16-alpine
    container_name: datapilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: datapilot
      POSTGRES_PASSWORD: datapilot
      POSTGRES_DB: datapilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datapilot -d datapilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datapilot-net

  redis:
    image: redis:7-alpine
    container_name: datapilot-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datapilot-net

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: datapilot-qdrant
    restart: unless-stopped
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datapilot-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datapilot-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://datapilot:datapilot@postgres:5432/datapilot?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QDRANT_URL: http://qdrant:6333
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - datapilot-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datapilot-worker
    restart: unless-stopped
    entrypoint: ["node", "dist/worker.js"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://datapilot:datapilot@postgres:5432/datapilot?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - datapilot-net

  frontend:
    build:
      context: ../datapilot-frontend
      dockerfile: Dockerfile
    container_name: datapilot-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - datapilot-net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  datapilot-net:
    driver: bridge
